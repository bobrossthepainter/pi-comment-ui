name: Publish package

on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: npm distribution tag
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
  release:
    types: [published]

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@bobrossthepainter"
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run check
      - run: npm test
      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$RELEASE_TAG" = "v$PACKAGE_VERSION" || {
            echo "Release tag $RELEASE_TAG does not match package version v$PACKAGE_VERSION" >&2
            exit 1
          }
      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_DIST_TAG: ${{ inputs.dist-tag || 'latest' }}
        run: npm publish --tag "$NPM_DIST_TAG"
