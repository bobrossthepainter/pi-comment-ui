<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pi comment</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --header: #010409;
      --panel: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --success: #238636;
      --success-hover: #2ea043;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    header, footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex: 0 0 auto;
      background: var(--header);
      border-color: var(--border);
      padding: 12px 16px;
    }

    header { border-bottom: 1px solid var(--border); }
    footer { border-top: 1px solid var(--border); }

    .title {
      min-width: 0;
    }

    h1 {
      margin: 0;
      color: #f0f6fc;
      font-size: 15px;
      font-weight: 600;
    }

    .subtitle, #status {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
    }

    #editor-shell {
      position: relative;
      min-height: 0;
      flex: 1 1 auto;
    }

    #editor-container, #fallback-editor {
      width: 100%;
      height: 100%;
    }

    #fallback-editor {
      display: none;
      resize: none;
      border: 0;
      outline: 0;
      padding: 16px 20px;
      background: var(--bg);
      color: var(--text);
      font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      tab-size: 2;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button {
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 13px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      font-weight: 600;
    }

    button:hover { background: #21262d; }

    #save-button {
      border-color: rgba(240, 246, 252, 0.1);
      background: var(--success);
      color: white;
    }

    #save-button:hover { background: var(--success-hover); }

    kbd {
      border: 1px solid var(--border);
      border-bottom-width: 2px;
      border-radius: 4px;
      padding: 1px 4px;
      background: var(--panel);
      color: var(--muted);
      font: 10px ui-monospace, SFMono-Regular, Menlo, monospace;
    }
  </style>
</head>
<body>
  <header>
    <div class="title">
      <h1>Comment on the last assistant response</h1>
      <div class="subtitle">Edit the quoted Markdown before returning it to Pi.</div>
    </div>
    <div id="status">Loading editor…</div>
  </header>

  <main id="editor-shell">
    <div id="editor-container"></div>
    <textarea id="fallback-editor" spellcheck="true" aria-label="Comment editor"></textarea>
  </main>

  <footer>
    <div class="subtitle"><kbd>Cmd/Ctrl</kbd> + <kbd>Enter</kbd> saves</div>
    <div class="actions">
      <button id="cancel-button" type="button">Cancel</button>
      <button id="save-button" type="button">Save comment</button>
    </div>
  </footer>

  <script id="comment-editor-data" type="application/json">__INLINE_DATA__</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>
  <script>
__INLINE_JS__
  </script>
</body>
</html>
